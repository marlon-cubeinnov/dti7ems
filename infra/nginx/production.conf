# DTI Region 7 EMS — Production Nginx
# HTTPS via certbot — direct connection, no Cloudflare proxy
# web-public on ports 80/443; web-admin on port 8086
# API calls proxied to services running on localhost via PM2

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name dti7ems.cubeworks.ai;

    return 301 https://$host$request_uri;
}

# ── web-public (HTTPS) ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name dti7ems.cubeworks.ai;

    ssl_certificate     /etc/letsencrypt/live/dti7ems.cubeworks.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dti7ems.cubeworks.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /opt/dti-ems/apps/web-public/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    location /api/identity/ {
        proxy_pass         http://127.0.0.1:3011/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size  10m;
    }

    location /api/events/ {
        proxy_pass         http://127.0.0.1:3012/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size  25m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── web-admin ─────────────────────────────────────────────────────────────────
server {
    listen 8086;
    server_name _;

    root /opt/dti-ems/apps/web-admin/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    location /api/identity/ {
        proxy_pass         http://127.0.0.1:3011/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size  10m;
    }

    location /api/events/ {
        proxy_pass         http://127.0.0.1:3012/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        client_max_body_size  25m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
