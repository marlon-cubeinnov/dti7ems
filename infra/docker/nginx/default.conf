# DTI Region 7 EMS — Nginx reverse proxy
# Listens on port 80; forwards everything to Vite on 8086 (Mac host).
# Vite handles /api/identity and /api/events proxying internally.

upstream vite {
    server host.docker.internal:5173;
    keepalive 32;
}

server {
    listen 8086;
    server_name dti7ems.cubeworks.com.ph localhost;

    proxy_connect_timeout  10s;
    proxy_send_timeout     100s;
    proxy_read_timeout     100s;

    # Preserve real client IP forwarded by Cloudflare
    set_real_ip_from  103.21.244.0/22;
    set_real_ip_from  103.22.200.0/22;
    set_real_ip_from  103.31.4.0/22;
    set_real_ip_from  104.16.0.0/13;
    set_real_ip_from  104.24.0.0/14;
    set_real_ip_from  108.162.192.0/18;
    set_real_ip_from  131.0.72.0/22;
    set_real_ip_from  141.101.64.0/18;
    set_real_ip_from  162.158.0.0/15;
    set_real_ip_from  172.64.0.0/13;
    set_real_ip_from  173.245.48.0/20;
    set_real_ip_from  188.114.96.0/20;
    set_real_ip_from  190.93.240.0/20;
    set_real_ip_from  197.234.240.0/22;
    set_real_ip_from  198.41.128.0/17;
    real_ip_header    CF-Connecting-IP;

    location / {
        proxy_pass         http://vite;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 25m;
    }
}
